<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Rajan Acharya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <style>
    :root {
      --bg: #050a14;
      --bg2: #0b1221;
      --surface: #111827;
      --surface2: #1a2538;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --gold: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: rgba(56,189,248,0.15);
      --glow: rgba(56,189,248,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.4;
    }

    .blob {
      position: fixed; border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0;
    }
    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(56,189,248,0.1), transparent 70%);
      top: -200px; right: -100px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(129,140,248,0.1), transparent 70%);
      bottom: 0; left: -100px;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 60px; height: 72px;
      background: rgba(5,10,20,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--muted);
      font-size: 0.875rem; font-weight: 500; letter-spacing: 0.05em;
      text-transform: uppercase; transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 1px; background: var(--accent);
      transform: scaleX(0); transition: transform 0.25s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }
    .nav-links a.active { color: var(--text); }

    /* PAGE HEADER */
    .page-header {
      position: relative; z-index: 1;
      padding: 140px 80px 60px;
      text-align: center;
    }

    .page-tag {
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 16px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900;
      line-height: 1.05; margin-bottom: 20px;
    }
    .page-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .page-desc { color: var(--muted); font-size: 1rem; max-width: 520px; margin: 0 auto 40px; line-height: 1.8; }

    /* FILTER TABS */
    .filter-bar {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 60px; position: relative; z-index: 1;
    }

    .filter-btn {
      padding: 8px 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; color: var(--muted); font-size: 0.8rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(56,189,248,0.1);
      border-color: var(--accent); color: var(--accent);
    }

    /* PROJECTS GRID */
    .projects-container {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 0 80px 100px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
    }

    /* PROJECT CARD */
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      display: flex; flex-direction: column;
      opacity: 0; animation: cardIn 0.5s ease forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .project-card:hover {
      transform: translateY(-6px);
      border-color: rgba(56,189,248,0.4);
      box-shadow: 0 20px 60px rgba(56,189,248,0.1);
    }

    .card-thumb {
      height: 180px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--bg2), var(--surface2));
      display: flex; align-items: center; justify-content: center;
    }

    .card-thumb .thumb-icon {
      font-size: 4rem; opacity: 0.3;
    }

    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s;
    }
    .project-card:hover .card-thumb img { transform: scale(1.05); }

    .card-badge {
      position: absolute; top: 12px; right: 12px;
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 4px 10px; border-radius: 100px;
      background: rgba(5,10,20,0.8); backdrop-filter: blur(8px);
      border: 1px solid var(--border); color: var(--accent2);
    }

    .card-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }

    .card-number {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      color: var(--accent); letter-spacing: 0.1em; margin-bottom: 10px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 700; margin-bottom: 10px;
      line-height: 1.3;
    }

    .card-desc {
      color: #94a3b8; font-size: 0.85rem; line-height: 1.75;
      flex: 1; margin-bottom: 20px;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .tag {
      font-size: 0.7rem; font-family: 'DM Mono', monospace;
      padding: 3px 10px; border-radius: 6px;
      background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.15);
      color: var(--accent2);
    }

    .card-actions { display: flex; gap: 10px; }

    .card-link {
      flex: 1; padding: 10px 16px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 600; text-align: center;
      text-decoration: none; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .card-link.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #050a14;
    }
    .card-link.primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .card-link.secondary {
      border: 1px solid var(--border); color: var(--muted);
    }
    .card-link.secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 80px 0;
      color: var(--muted);
    }
    .empty-state ion-icon { font-size: 3rem; margin-bottom: 12px; display: block; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border); padding: 28px 80px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); position: relative; z-index: 1;
    }
    footer p { font-size: 0.8rem; color: var(--muted); }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--accent); }

    @media (max-width: 900px) {
      nav { padding: 0 24px; }
      .page-header { padding: 100px 24px 40px; }
      .projects-container { padding: 0 24px 60px; }
      .projects-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 8px; text-align: center; padding: 20px 24px; }
    }
  </style>
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav>
    <a href="index.html" class="nav-logo">RA</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="projects.html" class="active">Projects</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="page-tag">// my work</div>
    <h1 class="page-title">Featured <span>Projects</span></h1>
    <p class="page-desc">A collection of web projects I've built — from management systems to interactive apps. Each one a learning journey.</p>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All Projects</button>
    <!-- Filter buttons auto-generated from project tags -->
  </div>

  <div class="projects-container">
    <div class="projects-grid" id="projectsGrid">
      <!-- Cards rendered by JS -->
    </div>
  </div>

  <footer>
    <div class="footer-logo">Rajan Acharya</div>
    <p>© 2025 Rajan Acharya · All rights reserved</p>
    <p style="font-size:0.75rem; color:#374151;">Built with HTML · CSS · JS</p>
  </footer>

  <script>
    /*
    ═══════════════════════════════════════════════════════════════════
    📦 PROJECT DATA  ← ADD YOUR PROJECTS HERE
    
    To add a new project, copy the template below and add it to the
    PROJECTS array. No other code changes needed!

    Template:
    {
      title: "Your Project Name",
      description: "A short description of what the project does and what you learned.",
      tags: ["HTML", "CSS", "JavaScript"],   ← used for filter buttons
      category: "Web App",                   ← shown as badge on card
      liveUrl: "https://your-live-link.com", ← set to null to hide button
      codeUrl: "https://github.com/...",     ← set to null to hide button
      emoji: "🏨",                           ← shown if no image
      image: null                            ← or "path/to/image.jpg"
    }
    ═══════════════════════════════════════════════════════════════════
    */

    const PROJECTS = [
      {
        title: "Hotel Management System",
        description: "A fully-functional hotel management web app featuring food ordering, menu browsing, and an interactive interface for Duwakot FoodLand. Built with vanilla HTML, CSS, and JavaScript.",
        tags: ["HTML", "CSS", "JavaScript"],
        category: "Web App",
        liveUrl: "https://zach100000.github.io/Duwakot-FoodLand/",
        codeUrl: null,
        emoji: "🏨",
        image: null
      },
      {
        title: "Shoe Store Management System",
        description: "An interactive shoe store front-end project showcasing product listings, cart management, and a clean shopping interface. Demonstrates dynamic DOM manipulation.",
        tags: ["HTML", "CSS", "JavaScript"],
        category: "E-Commerce",
        liveUrl: "https://zach100000.github.io/Projectjhutta/",
        codeUrl: null,
        emoji: "👟",
        image: null
      }
      /*
       ↑ Add more projects above this line following the same format
      */
    ];

    /* ─── AUTO-GENERATE FILTER BUTTONS ─── */
    function buildFilters() {
      const allTags = new Set();
      PROJECTS.forEach(p => p.tags.forEach(t => allTags.add(t)));
      const bar = document.getElementById('filterBar');
      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = tag;
        btn.textContent = tag;
        bar.appendChild(btn);
      });
    }

    /* ─── RENDER CARDS ─── */
    function renderProjects(filter = 'all') {
      const grid = document.getElementById('projectsGrid');
      const filtered = filter === 'all'
        ? PROJECTS
        : PROJECTS.filter(p => p.tags.includes(filter));

      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><ion-icon name="folder-open-outline"></ion-icon><p>No projects in this category yet.</p></div>`;
        return;
      }

      filtered.forEach((project, i) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.style.animationDelay = `${i * 80}ms`;

        const thumbContent = project.image
          ? `<img src="${project.image}" alt="${project.title}" loading="lazy" />`
          : `<div class="thumb-icon">${project.emoji}</div>`;

        const tagsHtml = project.tags.map(t => `<span class="tag">${t}</span>`).join('');

        const liveBtn = project.liveUrl
          ? `<a href="${project.liveUrl}" target="_blank" class="card-link primary"><ion-icon name="open-outline"></ion-icon> Live Demo</a>`
          : '';

        const codeBtn = project.codeUrl
          ? `<a href="${project.codeUrl}" target="_blank" class="card-link secondary"><ion-icon name="logo-github"></ion-icon> Source</a>`
          : '';

        card.innerHTML = `
          <div class="card-thumb">
            ${thumbContent}
            <span class="card-badge">${project.category}</span>
          </div>
          <div class="card-body">
            <div class="card-number">PROJECT — ${String(i + 1).padStart(2, '0')}</div>
            <div class="card-title">${project.title}</div>
            <p class="card-desc">${project.description}</p>
            <div class="card-tags">${tagsHtml}</div>
            <div class="card-actions">${liveBtn}${codeBtn}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    /* ─── FILTER CLICK EVENTS ─── */
    function setupFilters() {
      document.getElementById('filterBar').addEventListener('click', e => {
        if (!e.target.classList.contains('filter-btn')) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderProjects(e.target.dataset.filter);
      });
    }

    /* ─── INIT ─── */
    buildFilters();
    renderProjects();
    setupFilters();
  </script>
</body>
</html>
